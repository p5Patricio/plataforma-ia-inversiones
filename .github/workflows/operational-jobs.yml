name: Operational Jobs

on:
  schedule:
    # Daily operational cycle: data refresh, inference and paper trading.
    - cron: "20 6 * * *"
    # Weekly controlled retraining cycle.
    - cron: "40 6 * * 0"
  workflow_dispatch:
    inputs:
      job:
        description: Job to run
        required: true
        default: market_data
        type: choice
        options:
          - market_data
          - inference
          - paper_trading
          - retraining
          - full
          - full_retrain
      tickers:
        description: Optional comma-separated stored tickers, for example BTC-USD,AAPL
        required: false
        default: ""
      feature_sets:
        description: Comma-separated feature sets to materialize
        required: false
        default: technical_v2
      skip_collection:
        description: Materialize existing prices without downloading market data
        required: false
        default: false
        type: boolean
      model_name:
        description: Optional model filter for inference
        required: false
        default: ""
      model_version:
        description: Optional model version filter for inference
        required: false
        default: ""
      models:
        description: Candidate models for retraining
        required: false
        default: "logistic_regression,random_forest,extra_trees"
      confidence_thresholds:
        description: Candidate confidence thresholds for retraining
        required: false
        default: "0.55,0.60,0.65,0.70"
      scopes:
        description: Training scopes for retraining
        required: false
        default: "local,asset_class,global"
      require_incumbent_improvement:
        description: Require retraining candidates to improve the promoted incumbent
        required: false
        default: true
        type: boolean
      min_objective_improvement:
        description: Minimum objective-score margin over the incumbent
        required: false
        default: "0.0"

permissions:
  contents: read

jobs:
  run-operational-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      APP_ENV: production
      ALLOW_DEMO_FALLBACK: "false"
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      JOB_MODE: ${{ github.event_name == 'schedule' && (github.event.schedule == '40 6 * * 0' && 'full_retrain' || 'full') || inputs.job }}
      TICKERS: ${{ inputs.tickers || '' }}
      FEATURE_SETS: ${{ inputs.feature_sets || 'technical_v2' }}
      SKIP_COLLECTION: ${{ inputs.skip_collection || false }}
      MODEL_NAME: ${{ inputs.model_name || '' }}
      MODEL_VERSION: ${{ inputs.model_version || '' }}
      MODELS: ${{ inputs.models || 'logistic_regression,random_forest,extra_trees' }}
      CONFIDENCE_THRESHOLDS: ${{ inputs.confidence_thresholds || '0.55,0.60,0.65,0.70' }}
      SCOPES: ${{ inputs.scopes || 'local,asset_class,global' }}
      REQUIRE_INCUMBENT_IMPROVEMENT: ${{ github.event_name == 'schedule' && 'true' || inputs.require_incumbent_improvement }}
      MIN_OBJECTIVE_IMPROVEMENT: ${{ inputs.min_objective_improvement || '0.0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate runtime secrets
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "SUPABASE_URL and SUPABASE_KEY GitHub Secrets are required."
            exit 1
          fi

      - name: Check Supabase schema
        run: python -m collector.schema_check

      - name: Run market data job
        if: ${{ env.JOB_MODE == 'market_data' || env.JOB_MODE == 'full' || env.JOB_MODE == 'full_retrain' }}
        run: |
          mkdir -p reports
          CMD=(
            python -m collector.run_market_data_job
            --assets-file config/assets.core.json
            --feature-sets "$FEATURE_SETS"
            --out reports/market_data_job.json
          )
          if [ -n "$TICKERS" ]; then
            CMD+=(--tickers "$TICKERS")
          fi
          if [ "$SKIP_COLLECTION" = "true" ]; then
            CMD+=(--skip-collection)
          fi
          "${CMD[@]}"
          python -c "import json, sys; report=json.load(open('reports/market_data_job.json')); sys.exit(1 if report.get('failed', 0) else 0)"

      - name: Run retraining job
        if: ${{ env.JOB_MODE == 'retraining' || env.JOB_MODE == 'full_retrain' }}
        run: |
          mkdir -p reports
          FEATURE_SET="${FEATURE_SETS%%,*}"
          CMD=(
            python -m brain.run_retraining_job
            --feature-set "$FEATURE_SET"
            --models "$MODELS"
            --confidence-thresholds "$CONFIDENCE_THRESHOLDS"
            --scopes "$SCOPES"
            --min-objective-improvement "$MIN_OBJECTIVE_IMPROVEMENT"
            --out reports/retraining_job.json
          )
          if [ "$REQUIRE_INCUMBENT_IMPROVEMENT" != "true" ]; then
            CMD+=(--no-require-incumbent-improvement)
          fi
          if [ -n "$TICKERS" ]; then
            CMD+=(--tickers "$TICKERS")
          fi
          "${CMD[@]}"
          python -c "import json, sys; report=json.load(open('reports/retraining_job.json')); sys.exit(1 if report.get('failed', 0) else 0)"

      - name: Run inference job
        if: ${{ env.JOB_MODE == 'inference' || env.JOB_MODE == 'full' || env.JOB_MODE == 'full_retrain' }}
        run: |
          mkdir -p reports
          CMD=(python -m brain.run_inference_job --out reports/inference_job_latest.json)
          if [ -n "$MODEL_NAME" ]; then
            CMD+=(--model-name "$MODEL_NAME")
          fi
          if [ -n "$MODEL_VERSION" ]; then
            CMD+=(--model-version "$MODEL_VERSION")
          fi
          "${CMD[@]}"
          python -c "import json, sys; report=json.load(open('reports/inference_job_latest.json')); sys.exit(1 if report.get('failed', 0) else 0)"

      - name: Run paper trading job
        if: ${{ env.JOB_MODE == 'paper_trading' || env.JOB_MODE == 'full' || env.JOB_MODE == 'full_retrain' }}
        run: |
          mkdir -p reports
          CMD=(python -m brain.run_paper_trading_job --out reports/paper_trading_job.json)
          if [ -n "$TICKERS" ]; then
            CMD+=(--tickers "$TICKERS")
          fi
          if [ -n "$MODEL_NAME" ]; then
            CMD+=(--model-name "$MODEL_NAME")
          fi
          if [ -n "$MODEL_VERSION" ]; then
            CMD+=(--model-version "$MODEL_VERSION")
          fi
          "${CMD[@]}"
          python -c "import json, sys; report=json.load(open('reports/paper_trading_job.json')); sys.exit(1 if report.get('failed', 0) else 0)"

      - name: Upload job reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: operational-job-reports
          path: reports/*.json
          if-no-files-found: ignore

      - name: Notify operational webhook
        if: always()
        env:
          OPERATIONAL_WEBHOOK_URL: ${{ secrets.OPERATIONAL_WEBHOOK_URL }}
          GITHUB_JOB_STATUS: ${{ job.status }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: python -m ops.notify_operational_job --reports-dir reports
