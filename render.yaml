services:
  - type: web
    name: ia-inversiones-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health?include_schema=false
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: ALLOW_DEMO_FALLBACK
        value: "false"
      - key: API_CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
